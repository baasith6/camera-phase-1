services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: create the clips bucket
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until (mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}) do echo 'waiting for minio'; sleep 2; done;
      mc mb --ignore-existing local/${S3_BUCKET};
      mc anonymous set download local/${S3_BUCKET};
      echo 'bucket ready';
      "

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Redis__Connection: ${REDIS_CONNECTION}
      S3__Endpoint: ${S3_ENDPOINT}
      S3__PublicEndpoint: ${S3_PUBLIC_ENDPOINT}
      S3__Bucket: ${S3_BUCKET}
      S3__AccessKey: ${S3_ACCESS_KEY}
      S3__SecretKey: ${S3_SECRET_KEY}
      S3__Region: ${S3_REGION}
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Seed__AdminEmail: ${SEED_ADMIN_EMAIL}
      Seed__AdminPassword: ${SEED_ADMIN_PASSWORD}
      Seed__ConnectorBootstrapKey: ${CONNECTOR_BOOTSTRAP_KEY}
      Pilot__AlertVisibilityMode: ${ALERT_VISIBILITY_MODE}
      # CORS: allow both local dev and the Dockerized dashboard
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4200,http://localhost:80}
    ports:
      - "8081:8080"

  cloud-ai:
    build: ./cloud-ai
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      backend:
        condition: service_started
    environment:
      REDIS_CONNECTION: ${REDIS_CONNECTION}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION}
      CLOUD_AI_BACKEND_URL: ${CLOUD_AI_BACKEND_URL}
      CLOUD_AI_MODEL_BACKEND: ${CLOUD_AI_MODEL_BACKEND}
      CLOUD_AI_MODEL: ${CLOUD_AI_MODEL}
      CLOUD_AI_DEVICE: ${CLOUD_AI_DEVICE}
      CLOUD_AI_YOLOE_PROMPTS: ${CLOUD_AI_YOLOE_PROMPTS}
      CONNECTOR_BOOTSTRAP_KEY: ${CONNECTOR_BOOTSTRAP_KEY}

  # Edge connector — runs on the same machine that sees the camera (or in Docker for dev/demo)
  connector:
    build: ./connector
    depends_on:
      backend:
        condition: service_started
    volumes:
      - connector_data:/app/data
      - connector_samples:/app/samples
    environment:
      CONNECTOR_BACKEND_URL: http://backend:8080
      CONNECTOR_ADMIN_PORT: 8099
      CONNECTOR_BOOTSTRAP_KEY: ${CONNECTOR_BOOTSTRAP_KEY}
      CONNECTOR_STORE_ID: 11111111-1111-1111-1111-111111111111
      CONNECTOR_CAMERA_ID: 
      CONNECTOR_NAME: edge-connector-1
      CONNECTOR_SOURCE: file://samples/test.mp4
      CONNECTOR_LOOP: ${CONNECTOR_LOOP:-true}
      # ONVIF (leave blank for file/manual RTSP mode)
      CONNECTOR_ONVIF_HOST: ${CONNECTOR_ONVIF_HOST:-}
      CONNECTOR_ONVIF_PORT: ${CONNECTOR_ONVIF_PORT:-80}
      CONNECTOR_ONVIF_USER: ${CONNECTOR_ONVIF_USER:-admin}
      CONNECTOR_ONVIF_PASS: ${CONNECTOR_ONVIF_PASS:-admin}
      CONNECTOR_ONVIF_PROFILE: ${CONNECTOR_ONVIF_PROFILE:-auto}
      CONNECTOR_RTSP_RECONNECT_MAX_SEC: ${CONNECTOR_RTSP_RECONNECT_MAX_SEC:-60}
    ports:
      - "8099:8099"
    restart: unless-stopped

  # Angular dashboard — served by nginx, proxies /api → backend
  dashboard:
    build: ./dashboard
    depends_on:
      - backend
    ports:
      - "4200:80"
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
  connector_data:
  connector_samples:

